<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍹</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bowwy - Smart POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #fff1f2; 
            padding-bottom: 100px; 
            color: #4b5563;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
        }
        body.theme-tea { background-color: #fff1f2; }
        body.theme-flower { background-color: #eef2ff; }

        .page { display: none; animation: fadeIn 0.2s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .pink-gradient { background: linear-gradient(135deg, #fda4af 0%, #fb7185 100%); transition: all 0.5s ease; }
        .flower-gradient { background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%); }
        
        .nav-btn.active { color: #fb7185; }
        .theme-flower .nav-btn.active { color: #6366f1; }
        
        /* Low Stock Alert */
        .stock-alert { color: #dc2626 !important; animation: pulse 1.5s infinite; font-weight: 900; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #ptr-indicator { height: 0; overflow: hidden; transition: height 0.2s; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fb7185; font-weight: bold; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="theme-tea" id="body-theme">

    <div id="ptr-indicator">กำลังดึงเพื่อรีเฟรช... 🔄</div>

    <div id="header-bg" class="pink-gradient text-white p-6 rounded-b-[3.5rem] shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto space-y-4">
            <div class="flex gap-2">
                <select id="project-selector" onchange="updateTheme(); updateUI();" class="flex-1 bg-white/20 p-3 rounded-2xl font-semibold outline-none border border-white/30 text-sm text-white">
                    <option value="tea" class="text-gray-800">🥤 ร้านชาผลไม้รวม</option>
                    <option value="flower" class="text-gray-800">🌸 งานลวดกำมะหยี่</option>
                </select>
                <div class="bg-white/20 rounded-2xl flex items-center justify-center min-w-[120px] border border-white/30 overflow-hidden">
                    <input type="month" id="month-filter" onchange="updateUI()" class="bg-transparent text-white text-[11px] p-3 outline-none cursor-pointer w-full text-center font-bold">
                </div>
            </div>
            <div class="text-center py-2">
                <p class="text-[10px] opacity-90 uppercase tracking-[0.2em] mb-1 font-medium">กำไรสุทธิเดือนนี้</p>
                <h1 id="stat-profit" class="text-4xl font-bold">฿0</h1>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-5">
        
        <section id="page-dash" class="page active space-y-5">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-rose-100 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl" id="dash-emoji">✨</div>
                <p class="text-[11px] text-rose-400 uppercase font-bold mb-2 tracking-widest">ยอดขายวันนี้</p>
                <h2 id="daily-sales" class="text-5xl font-bold text-gray-800 mb-2">฿0</h2>
                <p id="daily-qty" class="text-sm font-medium text-gray-400 bg-rose-50 inline-block px-4 py-1 rounded-full">0 รายการ</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/60 p-5 rounded-[2.5rem] border border-rose-50 text-center shadow-sm">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">สะสม: ร้านชา</p>
                    <h3 id="net-tea" class="text-lg font-bold text-rose-500">฿0</h3>
                </div>
                <div class="bg-white/60 p-5 rounded-[2.5rem] border border-rose-50 text-center shadow-sm">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">สะสม: งานลวด</p>
                    <h3 id="net-flower" class="text-lg font-bold text-rose-500">฿0</h3>
                </div>
            </div>
            <div class="bg-gray-800 p-6 rounded-[2.5rem] text-center shadow-xl border-b-4 border-rose-400" id="wallet-card">
                <p class="text-[10px] text-gray-400 uppercase mb-1 font-bold tracking-widest">ยอดเงินรวมทั้งหมด</p>
                <h2 id="total-wallet" class="text-3xl font-bold text-white">฿0</h2>
            </div>
        </section>

        <section id="page-inventory" class="page space-y-4">
            <div class="bg-white p-6 rounded-[3rem] shadow-sm border border-rose-100">
                <h2 class="font-bold text-gray-700 text-sm uppercase tracking-wider mb-5 px-2">📦 เช็คสินค้าคงเหลือ</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-item-name" placeholder="เพิ่มสินค้าใหม่..." class="flex-1 p-4 rounded-2xl bg-rose-50/50 border-none outline-none text-sm focus:ring-2 ring-rose-200 transition-all">
                    <button onclick="addNewItem()" class="bg-rose-400 text-white px-6 rounded-2xl font-bold text-2xl shadow-md active:scale-90 transition-transform">+</button>
                </div>
                <div id="inventory-list" class="grid grid-cols-2 gap-4">
                    </div>
            </div>
        </section>

        <section id="page-record" class="page space-y-5">
            <div class="bg-white p-6 rounded-[3rem] shadow-sm border border-rose-100">
                <h2 class="font-bold text-gray-400 mb-5 text-[10px] uppercase tracking-[0.2em] text-center">รายจ่าย (ต้นทุน)</h2>
                <div class="space-y-3">
                    <input type="text" id="in-name" placeholder="ชื่อรายการ..." class="w-full p-4 rounded-2xl bg-gray-50 outline-none text-sm">
                    <input type="number" id="in-price" placeholder="ราคา ฿" class="w-full p-4 rounded-2xl bg-gray-50 font-bold text-rose-500 text-xl outline-none">
                    <button onclick="addInvest()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold">บันทึกต้นทุน</button>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[3rem] border border-rose-100 shadow-sm">
                <h2 class="font-bold text-rose-400 mb-5 text-[10px] uppercase tracking-[0.2em] text-center">บันทึกการขาย</h2>
                <input type="number" id="sale-price-input" placeholder="ราคาขายต่อชิ้น" class="w-full p-5 rounded-[2rem] bg-rose-50 font-bold text-rose-600 text-4xl text-center outline-none mb-4">
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded-[2.5rem] mb-6">
                    <button onclick="setQty(-1)" class="w-14 h-14 bg-white rounded-full text-2xl font-bold shadow-sm">-</button>
                    <input type="number" id="qty-input" value="1" class="w-16 text-center text-3xl font-bold text-gray-700 bg-transparent outline-none">
                    <button onclick="setQty(1)" class="w-14 h-14 bg-rose-400 text-white rounded-full text-2xl font-bold shadow-lg">+</button>
                </div>
                <button onclick="addSale()" class="w-full pink-gradient text-white py-5 rounded-[2.5rem] font-bold text-xl">ยืนยันการขาย</button>
            </div>
        </section>

        <section id="page-history" class="page space-y-3">
            <div id="log-list" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-rose-50 flex justify-around py-3 z-50 rounded-t-[2.5rem] shadow-lg">
        <button onclick="navTo('dash')" id="nav-dash" class="nav-btn active flex flex-col items-center flex-1">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span class="text-[9px] font-bold uppercase">หน้าแรก</span>
        </button>
        <button onclick="navTo('inventory')" id="nav-inventory" class="nav-btn flex flex-col items-center flex-1 text-gray-300">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span class="text-[9px] font-bold uppercase">สต็อก</span>
        </button>
        <button onclick="navTo('record')" id="nav-record" class="nav-btn flex flex-col items-center flex-1 text-gray-300">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span class="text-[9px] font-bold uppercase">บันทึก</span>
        </button>
        <button onclick="navTo('history')" id="nav-history" class="nav-btn flex flex-col items-center flex-1 text-gray-300">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span class="text-[9px] font-bold uppercase">ประวัติ</span>
        </button>
    </nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxNecfEsN-JsI-yrUq8QJrdsUXUJq5psL9ZYzopocXaNeU_wZBzksDjZgBuymGFjlNrg/exec";
    let db = { tea: { invest: [], sales: [], stock: [] }, flower: { invest: [], sales: [], stock: [] } };

    // --- Core Functions ---
    async function loadDataFromSheets() {
        try {
            document.getElementById('stat-profit').innerText = "รอข้อมูล...";
            const response = await fetch(SCRIPT_URL + "?action=getAllData&t=" + Date.now());
            const cloudData = await response.json();
            if (cloudData) { db = cloudData; updateUI(); }
        } catch (e) { console.error("Load Error:", e); updateUI(); }
    }

    async function syncToSheets(action, payload) {
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action, ...payload }) });
        } catch (e) { console.error("Sync Error:", e); }
    }

    // --- Inventory Functions (แก้จุดนี้ที่หายไป) ---
    function addNewItem() {
        const proj = document.getElementById('project-selector').value;
        const nameInput = document.getElementById('new-item-name');
        const name = nameInput.value.trim();
        
        if (!name) return alert("ระบุชื่อสินค้าด้วยครับ");
        if (db[proj].stock.some(i => i.name === name)) return alert("มีสินค้าชื่อนี้แล้ว");

        const newItem = { name: name, qty: 0 };
        db[proj].stock.push(newItem);
        
        syncToSheets('updateStock', { project: proj, itemName: name, newQty: 0 });
        nameInput.value = "";
        updateUI();
    }

    function adjustQty(itemName, change) {
        const proj = document.getElementById('project-selector').value;
        const item = db[proj].stock.find(i => i.name === itemName);
        if (item) {
            item.qty = Math.max(0, parseInt(item.qty) + change);
            syncToSheets('updateStock', { project: proj, itemName: itemName, newQty: item.qty });
            updateUI();
        }
    }

    function deleteItem(itemName) {
        if (!confirm(`ลบ ${itemName} ออกจากสต็อก?`)) return;
        const proj = document.getElementById('project-selector').value;
        db[proj].stock = db[proj].stock.filter(i => i.name !== itemName);
        syncToSheets('deleteStock', { project: proj, itemName: itemName });
        updateUI();
    }

    // --- UI & Theme ---
    function updateTheme() {
        const proj = document.getElementById('project-selector').value;
        const isFlower = proj === 'flower';
        document.getElementById('body-theme').className = isFlower ? 'theme-flower' : 'theme-tea';
        document.getElementById('header-bg').className = (isFlower ? 'flower-gradient' : 'pink-gradient') + ' text-white p-6 rounded-b-[3.5rem] shadow-lg sticky top-0 z-50';
        document.getElementById('dash-emoji').innerText = isFlower ? '🌸' : '✨';
        document.getElementById('wallet-card').style.borderColor = isFlower ? '#6366f1' : '#fb7185';
    }

    function updateUI() {
        const proj = document.getElementById('project-selector').value;
        const current = db[proj] || { invest: [], sales: [], stock: [] };
        
        // Stats Calculation (เหมือนเดิม)
        const totalSales = current.sales.reduce((s, i) => s + Number(i.price), 0);
        const totalInvest = current.invest.reduce((s, i) => s + Number(i.price), 0);
        document.getElementById('stat-profit').innerText = `฿${(totalSales - totalInvest).toLocaleString()}`;

        // Render Inventory
        const invList = document.getElementById('inventory-list');
        invList.innerHTML = "";
        current.stock.forEach(item => {
            const isLow = parseInt(item.qty) <= 0;
            invList.innerHTML += `
            <div class="bg-white p-4 rounded-3xl border ${isLow ? 'border-red-200 bg-red-50' : 'border-rose-100/50'} flex flex-col items-center relative shadow-sm">
                <button onclick="deleteItem('${item.name}')" class="absolute top-2 right-2 text-gray-300 hover:text-red-400">✕</button>
                <span class="font-bold text-[12px] text-gray-600 mb-2 mt-2">${item.name}</span>
                <div class="text-3xl font-bold ${isLow ? 'stock-alert' : 'text-rose-500'} mb-3">${item.qty}</div>
                <div class="flex w-full gap-2">
                    <button onclick="adjustQty('${item.name}', -1)" class="flex-1 bg-gray-100 py-2 rounded-xl font-bold">-</button>
                    <button onclick="adjustQty('${item.name}', 1)" class="flex-1 ${proj==='tea'?'bg-rose-400':'bg-indigo-400'} text-white py-2 rounded-xl font-bold">+</button>
                </div>
            </div>`;
        });
        
        // Update Dashboard (Simplified)
        document.getElementById('net-tea').innerText = `฿${(db.tea.sales.reduce((s,i)=>s+Number(i.price),0) - db.tea.invest.reduce((s,i)=>s+Number(i.price),0)).toLocaleString()}`;
        document.getElementById('net-flower').innerText = `฿${(db.flower.sales.reduce((s,i)=>s+Number(i.price),0) - db.flower.invest.reduce((s,i)=>s+Number(i.price),0)).toLocaleString()}`;
    }

    // --- App Init & Events ---
    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + id).classList.add('active');
    }

    function setQty(v) { document.getElementById('qty-input').value = Math.max(1, parseInt(document.getElementById('qty-input').value) + v); }

    // Pull to Refresh
    let startY = 0;
    window.addEventListener('touchstart', e => { if (window.scrollY === 0) startY = e.touches[0].pageY; });
    window.addEventListener('touchmove', e => {
        let dist = e.touches[0].pageY - startY;
        if (window.scrollY === 0 && dist > 0) {
            document.getElementById('ptr-indicator').style.height = Math.min(dist, 60) + 'px';
        }
    });
    window.addEventListener('touchend', () => {
        if (parseInt(document.getElementById('ptr-indicator').style.height) >= 60) loadDataFromSheets();
        document.getElementById('ptr-indicator').style.height = '0px';
    });

    document.addEventListener('DOMContentLoaded', () => {
        updateTheme();
        loadDataFromSheets();
    });
</script>
</body>
</html>
