<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIZ POS ONLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.15s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #2563eb; border-top: 4px solid #2563eb; background-color: #f8fafc; }
    </style>
</head>
<body>

    <div class="bg-slate-900 text-white p-6 rounded-b-[3rem] shadow-2xl sticky top-0 z-50">
        <div class="max-w-md mx-auto space-y-4">
            <div class="flex gap-2">
                <select id="project-selector" onchange="updateUI()" class="flex-1 bg-white/10 p-3 rounded-2xl font-bold outline-none border border-white/20 text-sm text-white">
                    <option value="tea" class="text-black">🥤 ร้านชาผลไม้รวม</option>
                    <option value="flower" class="text-black">🌸 งานลวดกำมะหยี่</option>
                </select>
                <div class="bg-blue-600 px-4 py-3 rounded-2xl font-bold text-[10px] flex items-center justify-center min-w-[120px]">
                    <span id="current-month-display">กำลังโหลด...</span>
                </div>
            </div>
            <div class="text-center">
                <p class="text-[9px] opacity-50 uppercase tracking-widest mb-1">กำไรสุทธิเดือนนี้ (Online)</p>
                <h1 id="stat-profit" class="text-4xl font-bold text-emerald-400">฿0</h1>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4">
        <section id="page-dash" class="page active space-y-4">
            <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 text-white p-8 rounded-[2.5rem] shadow-xl text-center">
                <p class="text-[10px] opacity-80 uppercase font-bold mb-2 tracking-widest">ยอดขายวันนี้</p>
                <h2 id="daily-sales" class="text-5xl font-bold mb-2">฿0</h2>
                <p id="daily-qty" class="text-lg opacity-90">0 แก้ว/ชิ้น</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] text-center shadow-lg">
                <p class="text-[10px] text-slate-400 uppercase mb-1 font-bold">รวมกำไรสุทธิทุกธุรกิจ</p>
                <h2 id="total-wallet" class="text-2xl font-bold text-white">฿0</h2>
            </div>
        </section>

        <section id="page-inventory" class="page space-y-4">
            <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-800 mb-4 text-xs uppercase tracking-wider">📦 เช็คของคงเหลือ</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-item-name" placeholder="ชื่อของใหม่..." class="flex-1 p-3 rounded-xl bg-slate-100 border-none outline-none text-sm focus:ring-2 ring-blue-500">
                    <button onclick="addNewItem()" class="bg-blue-600 text-white px-5 rounded-xl font-bold text-xl active:scale-90 transition-transform">+</button>
                </div>
                <div id="inventory-list" class="grid grid-cols-2 gap-3"></div>
            </div>
        </section>

        <section id="page-record" class="page space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-400 mb-4 text-[10px] uppercase tracking-widest text-center">บันทึกรายจ่าย (ต้นทุน)</h2>
                <div class="space-y-3">
                    <input type="text" id="in-name" placeholder="ชื่อรายการ (เช่น ซื้อผลไม้)" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border border-slate-100 focus:bg-white focus:ring-2 ring-slate-100 transition-all text-sm">
                    <input type="number" id="in-price" placeholder="ระบุราคาต้นทุน" class="w-full p-4 rounded-2xl bg-slate-50 font-bold text-red-500 outline-none border border-slate-100 text-2xl focus:bg-white focus:ring-2 ring-red-100 transition-all">
                    <button onclick="addInvest()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg text-sm mt-2">บันทึกรายการต้นทุน</button>
                </div>
            </div>
            <div class="bg-emerald-50 p-6 rounded-[2.5rem] shadow-inner border border-emerald-100">
                <h2 class="font-bold text-emerald-800 mb-4 text-[10px] uppercase tracking-widest text-center">บันทึกรายได้ (ขาย)</h2>
                <input type="number" id="sale-price-input" placeholder="ราคาขายต่อชิ้น" class="w-full p-4 rounded-3xl bg-white mb-4 font-bold text-emerald-600 text-3xl text-center outline-none border border-emerald-200 shadow-sm">
                <div class="flex items-center justify-between bg-white/60 p-2 rounded-[2rem] mb-6">
                    <button onclick="setQty(-1)" class="w-14 h-14 bg-white rounded-2xl text-2xl font-bold text-slate-300 shadow-sm">-</button>
                    <div class="text-center">
                        <input type="number" id="qty-input" value="1" class="w-16 text-center text-4xl font-bold text-emerald-600 outline-none bg-transparent">
                        <p class="text-[8px] text-emerald-400 font-bold uppercase">จำนวนชิ้น</p>
                    </div>
                    <button onclick="setQty(1)" class="w-14 h-14 bg-emerald-500 text-white rounded-2xl text-2xl font-bold shadow-lg shadow-emerald-100 active:scale-90">+</button>
                </div>
                <button onclick="addSale()" class="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-bold shadow-xl active:scale-95 transition-all text-xl">ยืนยันบันทึกขาย</button>
            </div>
        </section>

        <section id="page-history" class="page space-y-3">
            <div id="log-list" class="space-y-2"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-2 z-50 rounded-t-[2rem] shadow-2xl">
        <button onclick="navTo('dash')" id="nav-dash" class="nav-btn active flex flex-col items-center flex-1 py-2 rounded-xl text-blue-600">
            <span class="text-xl">📊</span><span class="text-[8px] font-bold uppercase mt-1">Home</span>
        </button>
        <button onclick="navTo('inventory')" id="nav-inventory" class="nav-btn flex flex-col items-center flex-1 py-2 rounded-xl text-slate-300">
            <span class="text-xl">📦</span><span class="text-[8px] font-bold uppercase mt-1">Check</span>
        </button>
        <button onclick="navTo('record')" id="nav-record" class="nav-btn flex flex-col items-center flex-1 py-2 rounded-xl text-slate-300">
            <span class="text-xl">➕</span><span class="text-[8px] font-bold uppercase mt-1">Add</span>
        </button>
        <button onclick="navTo('history')" id="nav-history" class="nav-btn flex flex-col items-center flex-1 py-2 rounded-xl text-slate-300">
            <span class="text-xl">📜</span><span class="text-[8px] font-bold uppercase mt-1">Log</span>
        </button>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5M2YunjRMpRVjagtWmCupvdzZZPl3e89w-54GvW0-uwuGIFqXSu77WWV5ZPlP0Xo81A/exec";

        let db = { 
            tea: { invest: [], sales: [], stock: [] },
            flower: { invest: [], sales: [], stock: [] }
        };

        // --- 1. การดึงข้อมูลแบบ Real-time และป้องกัน Cache ---
        async function loadDataFromSheets() {
            try {
                const profitDisplay = document.getElementById('stat-profit');
                const originalValue = profitDisplay.innerText;
                profitDisplay.innerText = "โหลดข้อมูล...";

                // เพิ่ม Timestamp เพื่อบังคับโหลดข้อมูลใหม่ ไม่ใช้ Cache ของ Browser
                const response = await fetch(SCRIPT_URL + "?action=getAllData&t=" + new Date().getTime());
                const cloudData = await response.json();
                
                if (cloudData) {
                    db = cloudData;
                    updateUI(); // วาดหน้าจอทันทีเมื่อข้อมูลมาถึง
                }
            } catch (e) {
                console.error("Load Error", e);
                updateUI(); // แสดงค่าเท่าที่มี (หรือ 0) หากโหลดไม่สำเร็จ
            }
        }

        // --- 2. การส่งข้อมูลไปบันทึก ---
        async function syncToSheets(action, payload) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify({ action, ...payload })
                });
            } catch (e) { console.error("Sync Error", e); }
        }

        function navTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active', 'text-blue-600');
                b.classList.add('text-slate-300');
            });
            document.getElementById('nav-' + pageId).classList.add('active', 'text-blue-600');
            document.getElementById('nav-' + pageId).classList.remove('text-slate-300');
            updateUI();
        }

        function addNewItem() {
            const proj = document.getElementById('project-selector').value;
            const name = document.getElementById('new-item-name').value.trim();
            if(!name) return;
            const newItem = { id: Date.now(), name, qty: 0 };
            db[proj].stock.push(newItem);
            document.getElementById('new-item-name').value = '';
            syncToSheets('updateStock', { project: proj, itemName: name, newQty: 0 });
            updateUI();
        }

        function adjustQty(id, change) {
            const proj = document.getElementById('project-selector').value;
            const item = db[proj].stock.find(i => i.id === id);
            if(item) { 
                item.qty = Math.max(0, item.qty + change); 
                syncToSheets('updateStock', { project: proj, itemName: item.name, newQty: item.qty });
                updateUI(); 
            }
        }

        function removeItem(id) {
            const proj = document.getElementById('project-selector').value;
            const item = db[proj].stock.find(i => i.id === id);
            if(item && confirm(`คุณต้องการลบ "${item.name}" ออกจากสต็อกใช่หรือไม่?`)) {
                syncToSheets('deleteStock', { project: proj, itemName: item.name });
                db[proj].stock = db[proj].stock.filter(i => i.id !== id);
                updateUI();
            }
        }

        function addInvest() {
            const proj = document.getElementById('project-selector').value;
            const price = parseFloat(document.getElementById('in-price').value);
            const name = document.getElementById('in-name').value || "ซื้อของ";
            if(!price) return alert("กรุณาใส่ราคา");
            const dateStr = new Date().toLocaleString('th-TH');
            const row = [Date.now(), proj, name, price, dateStr];
            db[proj].invest.push({ name, price, date: dateStr, id: row[0] });
            syncToSheets('addRecord', { type: 'Invest', row: row });
            document.getElementById('in-name').value = ''; 
            document.getElementById('in-price').value = '';
            updateUI(); 
            alert("บันทึกต้นทุนเรียบร้อย");
        }

        function addSale() {
            const proj = document.getElementById('project-selector').value;
            const price = parseFloat(document.getElementById('sale-price-input').value);
            const qty = parseInt(document.getElementById('qty-input').value);
            if(!price) return alert("กรุณาใส่ราคาขาย");
            const total = price * qty;
            const dateStr = new Date().toLocaleString('th-TH');
            const row = [Date.now(), proj, "ขายสินค้า", qty, total, dateStr];
            db[proj].sales.push({ name: "ขายสินค้า", qty, price: total, date: dateStr, id: row[0] });
            syncToSheets('addRecord', { type: 'Sales', row: row });
            updateUI(); 
            alert("บันทึกการขายเรียบร้อย");
        }

        function setQty(v) { document.getElementById('qty-input').value = Math.max(1, parseInt(document.getElementById('qty-input').value) + v); }

        // --- 3. ฟังก์ชันหลักในการวาดหน้าจอ (แก้ไข Logic วันที่เป๊ะ 100%) ---
        function updateUI() {
            const proj = document.getElementById('project-selector').value;
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const currentProject = db[proj] || { invest: [], sales: [], stock: [] };

            const parseDate = (dateStr) => {
                if (!dateStr) return null;
                const s = String(dateStr);
                const parts = s.split(' ')[0].split('/'); 
                if (parts.length < 3) return null;
                let d = parseInt(parts[0]);
                let m = parseInt(parts[1]) - 1;
                let y = parseInt(parts[2]);
                if (y > 2500) y -= 543;
                return new Date(y, m, d);
            };

            const isThisMonthAndYear = (dateStr) => {
                const d = parseDate(dateStr);
                if (!d) return false;
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            };

            const isToday = (dateStr) => {
                const d = parseDate(dateStr);
                if (!d) return false;
                return d.getDate() === now.getDate() && 
                       d.getMonth() === currentMonth && 
                       d.getFullYear() === currentYear;
            };

            // คำนวณ
            const mInv = (currentProject.invest || []).filter(i => isThisMonthAndYear(i.date)).reduce((s, i) => s + (Number(i.price) || 0), 0);
            const mSale = (currentProject.sales || []).filter(i => isThisMonthAndYear(i.date)).reduce((s, i) => s + (Number(i.price) || 0), 0);
            const dSale = (currentProject.sales || []).filter(i => isToday(i.date)).reduce((s, i) => s + (Number(i.price) || 0), 0);
            const dQty = (currentProject.sales || []).filter(i => isToday(i.date)).reduce((s, i) => s + (Number(i.qty) || 0), 0);
            
            // แสดงผลยอดเงิน
            const monthDisplay = now.toLocaleString('th-TH', { month: 'long', year: 'numeric' });
            document.getElementById('current-month-display').innerText = monthDisplay;
            document.getElementById('stat-profit').innerText = `฿${(mSale - mInv).toLocaleString()}`;
            document.getElementById('daily-sales').innerText = `฿${dSale.toLocaleString()}`;
            document.getElementById('daily-qty').innerText = `${dQty} แก้ว/ชิ้น`;
            
            const calcTotal = (p) => {
                const pj = db[p] || { sales: [], invest: [] };
                return (pj.sales || []).reduce((s, i) => s + (Number(i.price) || 0), 0) - 
                       (pj.invest || []).reduce((s, i) => s + (Number(i.price) || 0), 0);
            };
            document.getElementById('total-wallet').innerText = `฿${(calcTotal('tea') + calcTotal('flower')).toLocaleString()}`;

            // วาด Stock
            const invList = document.getElementById('inventory-list');
            invList.innerHTML = "";
            (currentProject.stock || []).forEach(item => {
                invList.innerHTML += `
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 flex flex-col items-center gap-2 shadow-sm relative">
                    <button onclick="removeItem(${item.id})" class="absolute top-2 right-2 w-6 h-6 bg-red-50 text-red-400 rounded-full text-[10px] flex items-center justify-center">🗑️</button>
                    <span class="font-bold text-[11px] text-slate-700 truncate w-3/4 text-center">${item.name}</span>
                    <div class="text-2xl font-bold text-blue-600 my-1">${item.qty}</div>
                    <div class="flex w-full gap-2">
                        <button onclick="adjustQty(${item.id}, -1)" class="flex-1 bg-white border border-slate-200 py-2 rounded-lg text-lg font-bold text-slate-400">-</button>
                        <button onclick="adjustQty(${item.id}, 1)" class="flex-1 bg-blue-600 py-2 rounded-lg text-lg font-bold text-white shadow-md active:scale-90">+</button>
                    </div>
                </div>`;
            });

            if(document.getElementById('page-history').classList.contains('active')) renderHistory();
        }

        function renderHistory() {
            const proj = document.getElementById('project-selector').value;
            const list = document.getElementById('log-list');
            list.innerHTML = "";
            const currentProject = db[proj] || { invest: [], sales: [] };
            const all = [
                ...currentProject.invest.map(i=>({...i, t:'I'})), 
                ...currentProject.sales.map(s=>({...s, t:'S'}))
            ].sort((a,b)=>b.id-a.id);
            
            all.forEach(x => {
                list.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between items-center border-l-4 ${x.t==='S'?'border-emerald-400':'border-red-400'} shadow-sm">
                    <div><p class="font-bold text-xs text-slate-700">${x.name} ${x.qty ? 'x'+x.qty : ''}</p><p class="text-[8px] text-slate-400">${x.date}</p></div>
                    <p class="font-bold ${x.t==='S'?'text-emerald-500':'text-red-400'}">฿${(Number(x.price) || 0).toLocaleString()}</p>
                </div>`;
            });
        }

        // --- 4. สั่งโหลดข้อมูลทันทีเมื่อเปิดแอป ---
        document.addEventListener('DOMContentLoaded', () => {
            loadDataFromSheets();
        });

    </script>
</body>
</html>
