<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bowwy</title>
<meta name="theme-color" content="#f7e8da">
<link rel="icon" type="image/png" href="https://i.ibb.co/7tTRgC8f/Gemini-Generated-Image-tkp3cttkp3cttkp3.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/7tTRgC8f/Gemini-Generated-Image-tkp3cttkp3cttkp3.png">
    <link rel="shortcut icon" href="https://i.ibb.co/7tTRgC8f/Gemini-Generated-Image-tkp3cttkp3cttkp3.png?v=1">
    <meta name="apple-mobile-web-app-title" content="Bowwy">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #fff1f2; 
            padding-bottom: 100px; 
            color: #4b5563;
            transition: background-color 0.6s ease;
        }
        body.theme-tea { background-color: #fff1f2; }
        body.theme-flower { background-color: #f5f3ff; }
        body.theme-fruit { background-color: #f0fdf4; } /* ธีมร้านผลไม้ใหม่ */

        .page { display: none; animation: fadeIn 0.2s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(251, 113, 133, 0.1); }
        .pink-gradient { background: linear-gradient(135deg, #fda4af 0%, #fb7185 100%); transition: all 0.5s ease; }
        .flower-gradient { background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%); transition: all 0.5s ease; }
        
        .nav-btn.active { color: #fb7185; }
        .nav-btn.active svg { transform: translateY(-3px); color: #fb7185; }
        
        .stock-alert { color: #ef4444 !important; font-weight: 900; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #ptr-status { height: 0; overflow: hidden; transition: height 0.2s; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #fb7185; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        #custom-dialog-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.15); backdrop-filter: blur(4px);
            z-index: 9999; display: none; align-items: center; justify-content: center;
            padding: 20px; animation: modalFade 0.3s ease;
        }
        @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
        
        .dialog-box {
            background: white; width: 100%; max-width: 320px;
            border-radius: 2.5rem; padding: 1.5rem; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: scale(1); animation: modalBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalBounce { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
    </style>
</head>
<body id="main-body" class="theme-tea">

    <div id="custom-dialog-overlay">
        <div class="dialog-box">
            <div id="dialog-icon" class="text-4xl mb-3">✨</div>
            <p id="dialog-message" class="text-gray-600 font-medium mb-6 px-2 leading-relaxed">ข้อความแจ้งเตือน</p>
            <div id="dialog-actions" class="flex gap-3">
                <button id="dialog-confirm" class="flex-1 py-3 rounded-2xl pink-gradient text-white font-bold shadow-lg shadow-rose-200 active:scale-95 transition-all">ตกลง</button>
                <button id="dialog-cancel" class="hidden flex-1 py-3 rounded-2xl bg-gray-100 text-gray-400 font-bold active:scale-95 transition-all">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="ptr-status">🔄 ปล่อยเพื่ออัปเดตข้อมูล</div>

    <div id="header-bar" class="pink-gradient text-white p-6 rounded-b-[3.5rem] shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto space-y-4">
            <div class="flex gap-2">
                <select id="project-selector" onchange="updateUI()" class="flex-1 bg-white/20 p-3 rounded-2xl font-semibold outline-none border border-white/30 text-sm text-white">
                    <option value="tea" class="text-gray-800">🥤 ร้านชาผลไม้รวม</option>
                    <option value="flower" class="text-gray-800">🌸 งานลวดกำมะหยี่</option>
                    <option value="fruitset" class="text-gray-800">🧺 ผลไม้จัดเซ็ต</option>
                </select>
                <div class="bg-white/20 rounded-2xl flex items-center justify-center min-w-[120px] border border-white/30 overflow-hidden">
                    <input type="month" id="month-filter" onchange="updateUI()" 
                        class="bg-transparent text-white text-[11px] p-3 outline-none cursor-pointer w-full text-center font-bold">
                </div>
            </div>
            <div class="text-center py-2">
                <p class="text-[10px] opacity-90 uppercase tracking-[0.2em] mb-1 font-medium">กำไรสุทธิเดือนนี้</p>
                <h1 id="stat-profit" class="text-4xl font-bold">฿0</h1>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-5">
        
<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 5s linear infinite; }
</style>
        <section id="page-dash" class="page active space-y-5">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-rose-100 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl">✨</div>
                <p class="text-[11px] text-rose-400 uppercase font-bold mb-2 tracking-widest">ยอดขายวันนี้</p>
                <h2 id="daily-sales" class="text-5xl font-bold text-gray-800 mb-2">฿0</h2>
                <p id="daily-qty" class="text-sm font-medium text-gray-400 bg-rose-50 inline-block px-4 py-1 rounded-full">0 รายการ</p>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-white/60 p-4 rounded-[2rem] border border-rose-50 text-center shadow-sm">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">ร้านชา</p>
                        <h3 id="net-tea" class="text-sm font-bold text-rose-500">฿0</h3>
                    </div>
                    <div class="bg-white/60 p-4 rounded-[2rem] border border-rose-50 text-center shadow-sm">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">งานลวด</p>
                        <h3 id="net-flower" class="text-sm font-bold text-rose-500">฿0</h3>
                    </div>
                    <div class="bg-white/60 p-4 rounded-[2rem] border border-rose-50 text-center shadow-sm">
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">ผลไม้</p>
                        <h3 id="net-fruit" class="text-sm font-bold text-rose-500">฿0</h3>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-[2.5rem] text-center shadow-xl border-b-4 border-rose-400">
                <p class="text-[10px] text-gray-400 uppercase mb-1 font-bold tracking-widest">ยอดเงินรวมทั้งหมด</p>
                <h2 id="total-wallet" class="text-3xl font-bold text-white">฿0</h2>
            </div>
        </section>

        <section id="page-inventory" class="page space-y-4">
            <div class="bg-white p-6 rounded-[3rem] shadow-sm border border-rose-100">
                <div class="flex items-center justify-between mb-5 px-2">
                    <h2 class="font-bold text-gray-700 text-sm uppercase tracking-wider">📦 เช็คสินค้าคงเหลือ</h2>
                </div>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-item-name" placeholder="เพิ่มสินค้าใหม่..." class="flex-1 p-4 rounded-2xl bg-rose-50/50 border-none outline-none text-sm focus:ring-2 ring-rose-200 transition-all">
                    <button onclick="addNewItem()" class="bg-rose-400 text-white px-6 rounded-2xl font-bold text-2xl shadow-md active:scale-90 transition-transform">+</button>
                </div>
                <div id="inventory-list" class="grid grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="page-record" class="page space-y-5">
            <div class="bg-white p-6 rounded-[3rem] shadow-sm border border-rose-100">
                <h2 class="font-bold text-gray-400 mb-5 text-[10px] uppercase tracking-[0.2em] text-center">รายจ่าย (ซื้อของ/ต้นทุน)</h2>
                <div class="space-y-3">
                    <input type="text" id="in-name" placeholder="ชื่อรายการ..." class="w-full p-4 rounded-2xl bg-gray-50 outline-none text-sm border border-transparent focus:bg-white focus:border-rose-100 transition-all">
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-rose-300 font-bold">฿</span>
                        <input type="number" id="in-price" placeholder="0.00" class="w-full p-4 pl-10 rounded-2xl bg-gray-50 font-bold text-rose-500 text-2xl outline-none border border-transparent">
                    </div>
                    <button onclick="addInvest()" class="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-[0.98] transition-all">บันทึกต้นทุน</button>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-[3rem] border border-rose-100 shadow-sm">
                <h2 class="font-bold text-rose-400 mb-5 text-[10px] uppercase tracking-[0.2em] text-center">รายได้ (บันทึกการขาย)</h2>
                <div class="relative mb-4">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-rose-200 text-xl font-bold">฿</span>
                    <input type="number" id="sale-price-input" placeholder="ราคาขาย" class="w-full p-5 pl-12 rounded-[2rem] bg-rose-50 font-bold text-rose-600 text-4xl text-center outline-none border border-rose-100">
                </div>
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded-[2.5rem] mb-6">
                    <button onclick="setQty(-1)" class="w-14 h-14 bg-white rounded-full text-2xl font-bold text-gray-300 shadow-sm active:scale-90">-</button>
                    <div class="text-center">
                        <input type="number" id="qty-input" value="1" class="w-16 text-center text-3xl font-bold text-gray-700 outline-none bg-transparent">
                        <p class="text-[8px] text-gray-400 font-bold uppercase">จำนวนชิ้น</p>
                    </div>
                    <button onclick="setQty(1)" class="w-14 h-14 bg-rose-400 text-white rounded-full text-2xl font-bold shadow-lg active:scale-90">+</button>
                </div>
                <button onclick="addSale()" class="w-full pink-gradient text-white py-5 rounded-[2.5rem] font-bold shadow-xl shadow-rose-200 text-xl active:scale-[0.98] transition-all">ยืนยันการขาย</button>
            </div>
        </section>

        <section id="page-history" class="page space-y-3">
            <div id="log-list" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-rose-50 flex justify-around py-3 z-50 rounded-t-[2.5rem] shadow-[0_-10px_25px_rgba(251,113,133,0.1)]">
        <button onclick="navTo('dash')" id="nav-dash" class="nav-btn active flex flex-col items-center flex-1">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            <span class="text-[9px] font-bold uppercase">หน้าแรก</span>
        </button>
        <button onclick="navTo('inventory')" id="nav-inventory" class="nav-btn flex flex-col items-center flex-1 text-gray-300">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            <span class="text-[9px] font-bold uppercase">สต็อก</span>
        </button>
        <button onclick="navTo('record')" id="nav-record" class="nav-btn flex flex-col items-center flex-1 text-gray-300">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
            <span class="text-[9px] font-bold uppercase">บันทึก</span>
        </button>
        <button onclick="navTo('history')" id="nav-history" class="nav-btn flex flex-col items-center flex-1 text-gray-300">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 2 0 00-2 2v12a2 2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            <span class="text-[9px] font-bold uppercase">ประวัติ</span>
        </button>
    </nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1aX6kk7SnkvWLHXcQY7CQ_Kb9nSiHggNq4Achnh3jLlYhsny4qhd9iqVZGWlL-yPkwg/exec";
    let db = { 
    tea: { invest: [], sales: [], stock: [] }, 
    flower: { invest: [], sales: [], stock: [] },
    fruitset: { invest: [], sales: [], stock: [] } // ✅ เพิ่ม
};
    let messageQueue = []; // คิวสำหรับสุ่มข้อความไม่ให้ซ้ำ

    const showDialog = (msg, isConfirm = false, autoClose = false) => {
        return new Promise((resolve) => {
            const overlay = document.getElementById('custom-dialog-overlay');
            const message = document.getElementById('dialog-message');
            const cancelBtn = document.getElementById('dialog-cancel');
            const confirmBtn = document.getElementById('dialog-confirm');
            const icon = document.getElementById('dialog-icon');

            message.innerText = msg;
            icon.innerText = isConfirm ? "❓" : "✨";
            cancelBtn.classList.toggle('hidden', !isConfirm);
            
            // ถ้าเป็น AutoClose (เช่นคำทักทาย) ให้ซ่อนปุ่มตกลงด้วย
            if(autoClose) confirmBtn.classList.add('hidden');
            else confirmBtn.classList.remove('hidden');

            overlay.style.display = 'flex';

            const close = (res) => {
                overlay.style.display = 'none';
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
                resolve(res);
            };

            if(autoClose) {
                setTimeout(() => close(true), 2500);
            }

            confirmBtn.onclick = () => close(true);
            cancelBtn.onclick = () => close(false);
        });
    };

    window.alert = (msg) => showDialog(msg);
    window.confirm = (msg) => showDialog(msg, true);

    // ฟังก์ชันคำทักทายตามช่วงเวลา
    function showGreeting() {
        const hr = new Date().getHours();
        let greet = "";
        let icon = "";
        
        if (hr < 12) { greet = "อรุณสวัสดิ์ยามเช้าครับคนเก่ง วันนี้ลุยกัน! ☀️"; icon = "☀️"; }
        else if (hr < 17) { greet = "บ่ายแล้ว สู้ๆ นะค้าบ ออเดอร์รัวๆ 🥤"; icon = "🥤"; }
        else if (hr < 22) { greet = "เย็นนี้กินอะไรดีคนดี ทำงานเหนื่อยไหม 🍲"; icon = "🍲"; }
        else { greet = "ดึกแล้วนะ พักผ่อนบ้างนะค้าบ เป็นห่วง ✨"; icon = "🌙"; }

        const iconEl = document.getElementById('dialog-icon');
        iconEl.innerText = icon;
        showDialog(greet, false, true);
    }

    let startY = 0;
    window.addEventListener('touchstart', (e) => { if (window.scrollY === 0) startY = e.touches[0].pageY; });
    window.addEventListener('touchmove', (e) => {
        const y = e.touches[0].pageY;
        if (window.scrollY === 0 && y > startY) {
            const diff = Math.min(y - startY, 60);
            document.getElementById('ptr-status').style.height = diff + 'px';
        }
    });
    window.addEventListener('touchend', () => {
        if (parseInt(document.getElementById('ptr-status').style.height) > 50) { loadDataFromSheets(); }
        document.getElementById('ptr-status').style.height = '0';
    });

    async function loadDataFromSheets() {
        try {
            document.getElementById('stat-profit').innerText = "กำลังโหลด...";
            const response = await fetch(SCRIPT_URL + "?action=getAllData&t=" + new Date().getTime());
            const cloudData = await response.json();
            if (cloudData) { db = cloudData; updateUI(); }
        } catch (e) { console.error("Load Error", e); updateUI(); }
    }

    async function syncToSheets(action, payload) {
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors', cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...payload })
            });
        } catch (e) { console.error("Sync Error", e); }
    }

    async function addInvest() {
        const proj = document.getElementById('project-selector').value;
        const price = parseFloat(document.getElementById('in-price').value);
        const name = document.getElementById('in-name').value || "ซื้อของ";
        if(!price) return alert("กรุณาใส่ราคา");
        const now = new Date();
        const timestamp = String(now.getTime());
        const dateOnly = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
        db[proj].invest.push({ name, price, date: dateOnly, id: timestamp });
        syncToSheets('addRecord', { type: 'Invest', row: [timestamp, proj, name, price, dateOnly] });
        document.getElementById('in-name').value = ''; document.getElementById('in-price').value = '';
        updateUI(); 
        await alert("บันทึกต้นทุนเรียบร้อย ✨");
    }

   async function addSale() {
        const proj = document.getElementById('project-selector').value;
        const price = parseFloat(document.getElementById('sale-price-input').value);
        const qty = parseInt(document.getElementById('qty-input').value);
        if(!price) return alert("กรุณาใส่ราคาขาย");
        
        const now = new Date();
        const total = price * qty;
        const timestamp = String(now.getTime());
        const dateOnly = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
        
        const messages = [
            "เก่งมากกคับบี๋ ✨", "ทำดีมาก มาจุ๊บ 👍", "รวยแล้ววว พาไปเที่ยวด้วยนะ 💰",
            "วันนี้เฮงๆ นะจ้ะ 🔥", "สุดยอดไปเลยค้าบ 💖", "ดูแลตัวเองด้วยจ้า 💖",
            "คนเก่งของเค้า สุดยอดที่สุดเลย 💖", "แฟนใครเนี่ย ทั้งเก่งทั้งน่ารัก ✨",
            "เก่งแบบนี้ ต้องรางวัลเป็นที่รักเยอะๆ แล้ว 🎁", "ออเดอร์เข้ารัวๆ รวยแล้วอย่าลืมเค้านะ 🤑",
            "เอาไปเลย 10 เต็มไม่หัก! 💯", "ที่หนึ่งในใจเค้าเลย 🥇",
            "ขายดีแบบนี้... คืนนี้เลี้ยงหมูกระทะเลยป่าว? 🥓", "ไหนดูซิ... เงินเข้ากี่บาท จะได้ขอถูก 🤑",
            "เกินต้านมากแม่ ✨", "ออเดอร์ปังมาก! 💸", "หยุดรวยกี่โมง? บอกเค้าด้วย 🏃‍♂️",
            "เก่งขนาดนี้ เย็นนี้ล้างจานด้วยนะจ๊ะ 🧼", "วันนี้ดวงเฮงนะเนี่ย สงสัยเพราะมีแฟนดี 😎"
        ];

        // สุ่มแบบไม่ซ้ำ
        if (messageQueue.length === 0) {
            messageQueue = [...messages].sort(() => Math.random() - 0.5);
        }
        const randomMsg = messageQueue.shift();

        db[proj].sales.push({ name: "ขายสินค้า", qty, price: total, date: dateOnly, id: timestamp });
        syncToSheets('addRecord', { type: 'Sales', row: [timestamp, proj, "ขายสินค้า", qty, total, dateOnly] });
        
        updateUI(); 

        // แสดงพลุกระดาษ 🎉
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: proj === 'tea' ? ['#fb7185', '#fda4af', '#ffffff'] : ['#6366f1', '#a5b4fc', '#ffffff']
        });

        await alert(randomMsg);
    }

    function addNewItem() {
        const proj = document.getElementById('project-selector').value;
        const name = document.getElementById('new-item-name').value;
        if(!name) return alert("กรุณาใส่ชื่อสินค้า");
        db[proj].stock.push({ name: name, qty: 0 });
        syncToSheets('updateStock', { project: proj, itemName: name, newQty: 0 });
        document.getElementById('new-item-name').value = ''; updateUI();
    }

    function updateUI() {
    const proj = document.getElementById('project-selector').value;
    const monthInput = document.getElementById('month-filter');
    const now = new Date();
    
    const body = document.getElementById('main-body');
    const header = document.getElementById('header-bar');
    const confirmBtn = document.getElementById('dialog-confirm');

    // --- ส่วนที่ 1: จัดการธีมสี (เพิ่มร้านผลไม้) ---
    if(proj === 'flower') {
        body.className = 'theme-flower';
        header.className = 'flower-gradient text-white p-6 rounded-b-[3.5rem] shadow-lg sticky top-0 z-50 transition-all';
        confirmBtn.className = 'flex-1 py-3 rounded-2xl flower-gradient text-white font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-all';
    } else if(proj === 'fruitset') {
        body.className = 'theme-fruit'; // ใช้สีเขียวที่เพิ่มไว้ใน CSS
        header.className = 'bg-emerald-500 text-white p-6 rounded-b-[3.5rem] shadow-lg sticky top-0 z-50 transition-all';
        confirmBtn.className = 'flex-1 py-3 rounded-2xl bg-emerald-500 text-white font-bold shadow-lg shadow-emerald-200 active:scale-95 transition-all';
    } else {
        body.className = 'theme-tea';
        header.className = 'pink-gradient text-white p-6 rounded-b-[3.5rem] shadow-lg sticky top-0 z-50 transition-all';
        confirmBtn.className = 'flex-1 py-3 rounded-2xl pink-gradient text-white font-bold shadow-lg shadow-rose-200 active:scale-95 transition-all';
    }

    if (!monthInput.value) {
        monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }
    const [selectedYear, selectedMonth] = monthInput.value.split('-').map(Number);
    const currentProject = db[proj] || { invest: [], sales: [], stock: [] };

    const parseDate = (dStr) => {
        const parts = String(dStr).split(/[\/\- ]/);
        if (parts.length < 3) return { d: 0, m: 0, y: 0 };
        let d = parseInt(parts[0]), m = parseInt(parts[1]), y = parseInt(parts[2]);
        if (y > 2500) y -= 543;
        return { d, m, y };
    };

    // คำนวณรายเดือนและรายวัน
    const mInv = currentProject.invest.filter(x => parseDate(x.date).m === selectedMonth && parseDate(x.date).y === selectedYear).reduce((s, i) => s + Number(i.price), 0);
    const mSale = currentProject.sales.filter(x => parseDate(x.date).m === selectedMonth && parseDate(x.date).y === selectedYear).reduce((s, i) => s + Number(i.price), 0);
    const dSale = currentProject.sales.filter(x => { const t = parseDate(x.date); return t.d === now.getDate() && t.m === (now.getMonth()+1) && t.y === now.getFullYear(); }).reduce((s, i) => s + Number(i.price), 0);
    const dQty = currentProject.sales.filter(x => { const t = parseDate(x.date); return t.d === now.getDate() && t.m === (now.getMonth()+1) && t.y === now.getFullYear(); }).reduce((s, i) => s + Number(i.qty), 0);

    document.getElementById('stat-profit').innerText = `฿${(mSale - mInv).toLocaleString()}`;
    document.getElementById('daily-sales').innerText = `฿${dSale.toLocaleString()}`;
    document.getElementById('daily-qty').innerText = `${dQty} ${proj === 'tea' ? 'แก้ว' : 'ชิ้น'}`;

    // --- ส่วนที่ 2: คำนวณกำไรสะสม (เพิ่ม fruitset) ---
    const netTea = db.tea.sales.reduce((s,i)=>s+Number(i.price),0) - db.tea.invest.reduce((s,i)=>s+Number(i.price),0);
    const netFlower = db.flower.sales.reduce((s,i)=>s+Number(i.price),0) - db.flower.invest.reduce((s,i)=>s+Number(i.price),0);
    const netFruit = db.fruitset.sales.reduce((s,i)=>s+Number(i.price),0) - db.fruitset.invest.reduce((s,i)=>s+Number(i.price),0);

    document.getElementById('net-tea').innerText = `฿${netTea.toLocaleString()}`;
    document.getElementById('net-flower').innerText = `฿${netFlower.toLocaleString()}`;
    
    // ตรวจสอบว่ามี element net-fruit หรือไม่ก่อนใส่ค่า
    if(document.getElementById('net-fruit')) {
        document.getElementById('net-fruit').innerText = `฿${netFruit.toLocaleString()}`;
    }
    
    // ยอดรวมกระเป๋าตังค์ทั้งหมด (รวม 3 ร้าน)
    document.getElementById('total-wallet').innerText = `฿${(netTea + netFlower + netFruit).toLocaleString()}`;

    // เรนเดอร์รายการสต็อก
    const invList = document.getElementById('inventory-list');
    invList.innerHTML = "";
    currentProject.stock.forEach(item => {
        const isLow = item.qty < 1;
        // ปรับสีปุ่มตามโปรเจกต์
        let btnColor = 'bg-rose-400';
        if(proj === 'flower') btnColor = 'bg-indigo-400';
        if(proj === 'fruitset') btnColor = 'bg-emerald-500';

        invList.innerHTML += `
        <div class="bg-white p-4 rounded-3xl border ${isLow ? 'border-red-200 shadow-red-50' : 'border-rose-100/50'} flex flex-col items-center gap-2 relative shadow-sm">
            <button onclick="deleteItem('${item.name}')" class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center text-red-500 active:scale-90 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
            <span class="font-bold text-[12px] text-gray-600 truncate w-3/4 text-center mt-2">${item.name}</span>
            <div class="text-3xl font-bold ${isLow ? 'stock-alert' : 'text-rose-500'} my-1">${item.qty}</div>
            <div class="flex w-full gap-2 mt-1">
                <button onclick="adjustQty('${item.name}', -1)" class="flex-1 bg-gray-50 py-2 rounded-xl text-lg font-bold text-gray-300">-</button>
                <button onclick="adjustQty('${item.name}', 1)" class="flex-1 ${btnColor} py-2 rounded-xl text-lg font-bold text-white shadow-md active:scale-95">+</button>
            </div>
        </div>`;
    });
    
    if(document.getElementById('page-history').classList.contains('active')) renderHistory();
}
    function adjustQty(itemName, change) {
        const proj = document.getElementById('project-selector').value;
        const item = db[proj].stock.find(i => i.name === itemName);
        if(item) { item.qty = Math.max(0, parseInt(item.qty) + change); syncToSheets('updateStock', { project: proj, itemName: item.name, newQty: item.qty }); updateUI(); }
    }

    async function deleteItem(itemName) {
        const confirmed = await confirm('ยืนยันลบสินค้า?');
        if(!confirmed) return;
        const proj = document.getElementById('project-selector').value;
        db[proj].stock = db[proj].stock.filter(i => i.name !== itemName);
        syncToSheets('deleteStock', { project: proj, itemName: itemName });
        updateUI();
    }

    function renderHistory() {
        const proj = document.getElementById('project-selector').value;
        const monthInput = document.getElementById('month-filter');
        const [selYear, selMonth] = monthInput.value.split('-').map(Number);
        const list = document.getElementById('log-list');
        list.innerHTML = "";
        const all = [...db[proj].invest.map(i => ({ ...i, t: 'I' })), ...db[proj].sales.map(s => ({ ...s, t: 'S' }))]
            .filter(x => { const d = String(x.date).split(/[\/\- ]/); let y = parseInt(d[2]); if(y>2500) y-=543; return parseInt(d[1])===selMonth && y===selYear; })
            .sort((a, b) => b.id - a.id);
        if (all.length === 0) { list.innerHTML = `<div class="text-center p-12 text-gray-300 text-sm">ไม่มีประวัติ</div>`; return; }
        all.forEach(x => {
            const isS = x.t === 'S';
            list.innerHTML += `
            <div class="bg-white p-5 rounded-[2rem] flex justify-between items-center border-l-4 ${isS ? 'border-rose-400' : 'border-gray-200'} shadow-sm">
                <div><p class="font-bold text-sm text-gray-700">${x.name} ${x.qty ? 'x'+x.qty : ''}</p><p class="text-[10px] text-gray-300">📅 ${x.date}</p></div>
                <div class="flex items-center gap-4">
                    <p class="font-bold text-lg ${isS ? 'text-rose-500' : 'text-gray-400'}">฿${Number(x.price).toLocaleString()}</p>
                    <button onclick="deleteRecord('${isS ? 'Sales' : 'Invest'}', '${x.id}')" class="text-red-500 active:scale-90 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            </div>`;
        });
    }

    async function deleteRecord(type, id) {
        const confirmed = await confirm(`ลบรายการนี้?`);
        if (!confirmed) return;
        const proj = document.getElementById('project-selector').value;
        if (type === 'Sales') db[proj].sales = db[proj].sales.filter(i => String(i.id) !== String(id));
        else db[proj].invest = db[proj].invest.filter(i => String(i.id) !== String(id));
        updateUI(); renderHistory(); await syncToSheets('deleteRecord', { type: type, id: id });
    }

    function navTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-gray-300'); });
        document.getElementById('nav-' + pageId).classList.add('active');
        updateUI();
    }
    
    function setQty(v) { document.getElementById('qty-input').value = Math.max(1, parseInt(document.getElementById('qty-input').value) + v); }
    
    document.addEventListener('DOMContentLoaded', () => {
        loadDataFromSheets();
        showGreeting(); // เรียกใช้คำทักทายตอนเข้าเว็บ
    });
</script>

function sendLove() {
    confetti({
        particleCount: 40,
        spread: 360,
        ticks: 100,
        gravity: 0.5,
        decay: 0.94,
        startVelocity: 30,
        shapes: ['heart'],
        colors: ['#ff69b4', '#ff1493', '#ffc0cb'],
        scalar: 2
    });

    const randomMsg = sweetMessages[Math.floor(Math.random() * sweetMessages.length)];
    const modal = document.getElementById('love-modal');
    const card = document.getElementById('love-card');
    const text = document.getElementById('love-text');

    text.innerText = randomMsg;
    modal.classList.remove('hidden');
    setTimeout(() => card.classList.remove('scale-0'), 10);

    setTimeout(() => {
        card.classList.add('scale-0');
        setTimeout(() => modal.classList.add('hidden'), 600);
    }, 5000);
}
